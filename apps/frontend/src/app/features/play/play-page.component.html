<main
  class="play-page-bg font-body relative flex min-h-screen items-center justify-center overflow-hidden"
>
  <!-- Background pattern overlay -->
  <div class="play-page-pattern pointer-events-none absolute inset-0 opacity-30"></div>

  <!-- Floating decorative shapes -->
  <div class="pointer-events-none absolute inset-0 overflow-hidden">
    <div
      class="play-float-1 absolute top-[15%] left-[10%] h-32 w-32 rotate-12 rounded-3xl bg-white/10"
    ></div>
    <div
      class="play-float-2 absolute top-[20%] right-[15%] h-24 w-24 -rotate-6 rounded-2xl bg-white/10"
    ></div>
    <div
      class="play-float-3 absolute bottom-[25%] left-[20%] h-28 w-28 rotate-45 rounded-3xl bg-white/10"
    ></div>
    <div
      class="play-float-4 absolute right-[10%] bottom-[15%] h-36 w-36 -rotate-12 rounded-3xl bg-white/10"
    ></div>
    <div
      class="play-float-5 absolute top-[10%] left-[50%] h-20 w-20 rotate-6 rounded-2xl bg-white/10"
    ></div>
    <div
      class="play-float-6 absolute top-[60%] left-[5%] h-16 w-16 -rotate-45 rounded-xl bg-white/10"
    ></div>
  </div>

  <!-- Top bar -->
  <div class="absolute top-0 right-0 left-0 z-20 flex items-center justify-between px-6 py-4">
    <a
      routerLink="/dashboard"
      class="rounded-2xl px-4 py-2 text-sm font-bold text-white/80 transition hover:bg-white/10 hover:text-white"
    >
      ← Dashboard
    </a>
    <span class="font-display text-lg font-bold text-white/60">Join a Game</span>
    <div class="w-24"></div>
  </div>

  <!-- Main content -->
  <div class="relative z-10 flex w-full max-w-md flex-col items-center px-6">
    <!-- Logo -->
    <div class="mb-8 text-center">
      <div
        class="play-logo mx-auto mb-4 flex h-24 w-24 items-center justify-center rounded-3xl bg-white/20 shadow-lg backdrop-blur-sm"
      >
        <span class="font-display text-5xl font-bold text-white">QF</span>
      </div>
      <h1 class="font-display text-5xl font-bold text-white drop-shadow-lg">QuizForge</h1>
    </div>

    <!-- Join card -->
    <div class="w-full rounded-3xl bg-white/15 p-8 shadow-2xl backdrop-blur-md">
      <h2 class="font-display mb-6 text-center text-2xl font-bold text-white">Enter Game ID</h2>

      @if (errorMessage()) {
        <div
          class="mb-4 rounded-2xl border border-rose-300/50 bg-rose-500/20 px-4 py-3 text-center text-sm font-bold text-white"
        >
          {{ errorMessage() }}
        </div>
      }

      <!-- Username input -->
      <input
        [(ngModel)]="username"
        maxlength="60"
        class="play-input mb-3 w-full rounded-2xl border-2 border-white/30 bg-white/20 px-4 py-3 text-center text-lg font-bold text-white backdrop-blur-sm placeholder:text-white/50"
        placeholder="Your display name"
        (keydown.enter)="joinGame()"
      />

      <!-- PIN input + join button -->
      <div class="flex gap-3">
        <input
          [(ngModel)]="gameId"
          maxlength="6"
          class="play-input font-display flex-1 rounded-2xl border-2 border-white/30 bg-white/20 px-4 py-4 text-center text-3xl font-bold tracking-[0.3em] text-white backdrop-blur-sm placeholder:text-white/50"
          placeholder="000000"
          inputmode="numeric"
          (keydown.enter)="joinGame()"
        />
        <button
          type="button"
          class="play-join-btn text-bubbly-primary flex h-16 w-16 items-center justify-center rounded-2xl bg-white transition-all hover:scale-105 hover:shadow-lg active:scale-95 disabled:opacity-50"
          [disabled]="busy()"
          (click)="joinGame()"
        >
          @if (busy()) {
            <svg
              class="h-6 w-6 animate-spin"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
              ></path>
            </svg>
          } @else {
            <svg
              class="h-7 w-7"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M13 7l5 5m0 0l-5 5m5-5H6"
              />
            </svg>
          }
        </button>
      </div>

      <p class="mt-4 text-center text-sm font-semibold text-white/60">
        Enter the 6-digit code from your host
      </p>
    </div>

    <!-- Quick stats hint -->
    <div class="mt-8 flex gap-6 text-center">
      <div>
        <p class="font-display text-2xl font-bold text-white/80">Live</p>
        <p class="text-xs font-semibold text-white/50">Sessions</p>
      </div>
      <div class="h-10 w-px bg-white/20"></div>
      <div>
        <p class="font-display text-2xl font-bold text-white/80">Real-time</p>
        <p class="text-xs font-semibold text-white/50">Multiplayer</p>
      </div>
      <div class="h-10 w-px bg-white/20"></div>
      <div>
        <p class="font-display text-2xl font-bold text-white/80">Fun</p>
        <p class="text-xs font-semibold text-white/50">Learning</p>
      </div>
    </div>
  </div>
</main>
