<section class="grid gap-8 text-slate-900">
  <app-page-heading
    eyebrow="Results"
    title="Final Standings"
    description="Demo-ready podium, chasers, and leaderboard surfaces using the shared Bubbly UI language."
  />

  <section class="mb-12 grid items-end gap-4 sm:grid-cols-3">
    @for (player of podium; track player.rank) {
      <article
        [class]="
          'qf-surface qf-tactile rounded-3xl border-4 border-white p-4 text-center ' +
          (player.rank === 1 ? 'sm:-translate-y-3' : '')
        "
      >
        <p class="font-display mb-2 text-xl font-bold text-slate-600">{{ player.score }}</p>
        <div
          class="mx-auto mb-3 rounded-full border-4"
          [class.w-28]="player.rank === 1"
          [class.h-28]="player.rank === 1"
          [class.w-24]="player.rank !== 1"
          [class.h-24]="player.rank !== 1"
          [class.border-[#ffc107]]="player.rank === 1"
          [class.border-[#c0c0c0]]="player.rank === 2"
          [class.border-[#cd7f32]]="player.rank === 3"
          [style.background-image]="'url(' + player.avatarImage + ')'"
          style="background-size: cover; background-position: center"
        ></div>
        <p class="font-display mb-3 text-xl font-bold text-slate-900">{{ player.name }}</p>
        <div
          [class]="
            'font-display rounded-t-2xl border-4 border-white pt-4 text-5xl font-black text-white ' +
            podiumHeight(player.rank) +
            ' ' +
            podiumColor(player.rank)
          "
        >
          {{ player.rank }}
        </div>
      </article>
    }
  </section>

  <section class="qf-surface mb-10 overflow-hidden rounded-3xl">
    <header class="bg-bubbly-primary px-6 py-4">
      <h2 class="font-display text-xl font-bold text-white">The Chasers</h2>
    </header>

    <div class="grid">
      @for (player of chasers; track player.rank) {
        <div
          class="flex items-center justify-between border-b border-slate-100 px-6 py-4 odd:bg-white even:bg-sky-50/70"
        >
          <div class="flex items-center gap-4">
            <span class="font-display w-6 text-center text-lg font-bold text-slate-500">
              {{ player.rank }}
            </span>
            <span
              class="text-bubbly-primary flex h-10 w-10 items-center justify-center rounded-full border-2 border-sky-200 bg-white text-sm font-bold"
            >
              {{ player.initials }}
            </span>
            <span class="text-lg font-bold text-slate-900">{{ player.name }}</span>
          </div>
          <span class="font-display text-lg font-bold text-slate-800">{{ player.score }}</span>
        </div>
      }
    </div>
  </section>

  <div class="mx-auto max-w-sm">
    <a
      routerLink="/dashboard"
      class="qf-button-primary qf-tactile flex min-h-14 items-center justify-center rounded-2xl px-6 text-base font-bold"
    >
      Back To Dashboard
    </a>
  </div>
</section>
