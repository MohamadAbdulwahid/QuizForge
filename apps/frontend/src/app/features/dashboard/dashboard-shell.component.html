<main class="qf-app-bg font-body min-h-screen text-slate-900">
  <div class="flex min-h-screen">
    <aside
      class="qf-surface sticky top-0 hidden h-screen w-72 shrink-0 flex-col rounded-r-[2rem] p-4 lg:flex"
    >
      <div
        class="bg-bubbly-primary rounded-3xl p-5 text-white shadow-[0_6px_0_0_var(--bubbly-primary-deep)]"
      >
        <p class="text-xs font-bold tracking-[0.24em] text-white/80 uppercase">Command Center</p>
        <h1 class="font-display mt-2 text-3xl font-bold">QuizForge</h1>
      </div>

      <nav class="mt-5 grid gap-2 text-sm font-bold">
        @for (item of navItems; track item.route) {
          <a
            [routerLink]="item.route"
            [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
            routerLinkActive="bg-bubbly-primary text-white shadow-[0_4px_0_0_var(--bubbly-primary-deep)]"
            class="qf-tactile hover:text-bubbly-primary rounded-2xl px-4 py-3 text-slate-600 hover:bg-sky-50"
          >
            <span class="block">{{ item.label }}</span>
            <span class="block text-xs opacity-70">{{ item.description }}</span>
          </a>
        }
      </nav>

      <div class="mt-auto rounded-3xl bg-slate-50 p-4">
        <p class="text-xs font-bold tracking-[0.18em] text-slate-500 uppercase">Signed in</p>
        <p class="font-display text-bubbly-primary mt-1 truncate text-lg font-bold">
          {{ displayName() }}
        </p>
        <button
          type="button"
          class="qf-button-ghost qf-tactile mt-4 w-full rounded-2xl px-4 py-3 text-sm font-bold"
          (click)="logout()"
        >
          Logout
        </button>
      </div>
    </aside>

    <section class="flex min-w-0 flex-1 flex-col">
      <header class="sticky top-0 z-30 border-b border-white/70 bg-white/90 px-4 py-3 lg:hidden">
        <div class="flex items-center justify-between gap-3">
          <div>
            <p class="text-xs font-bold tracking-[0.2em] text-slate-500 uppercase">QuizForge</p>
            <p class="font-display text-bubbly-primary text-xl font-bold">{{ displayName() }}</p>
          </div>
          <button
            type="button"
            class="qf-button-primary qf-tactile rounded-2xl px-4 py-3 text-sm font-bold"
            [attr.aria-expanded]="mobileNavOpen()"
            (click)="toggleMobileNav()"
          >
            Menu
          </button>
        </div>

        @if (mobileNavOpen()) {
          <nav class="mt-4 grid grid-cols-2 gap-2 text-xs font-bold">
            @for (item of navItems; track item.route) {
              <a
                [routerLink]="item.route"
                [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
                routerLinkActive="bg-bubbly-primary text-white"
                class="rounded-2xl bg-slate-100 px-3 py-3 text-center text-slate-700"
                (click)="closeMobileNav()"
              >
                {{ item.label }}
              </a>
            }
          </nav>
        }
      </header>

      <div class="w-full flex-1 px-4 py-6 sm:px-6 lg:px-8 lg:py-8">
        <router-outlet></router-outlet>
      </div>
    </section>
  </div>
</main>
