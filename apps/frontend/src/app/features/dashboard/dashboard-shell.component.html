<main class="font-body min-h-screen bg-[#f6f7f8] text-[#1e293b]">
  <div class="mx-auto flex max-w-[1280px] flex-col sm:flex-row">
    <aside
      class="hidden min-h-screen w-[260px] shrink-0 border-r border-[#e4e7eb] bg-white sm:flex sm:flex-col"
    >
      <div class="border-b border-[#e4e7eb] px-6 py-6">
        <h1 class="font-display text-2xl font-bold text-[#1e88e5]">QuizForge</h1>
        <p class="text-xs font-bold tracking-[0.2em] text-[#64748b] uppercase">Command Center</p>
      </div>

      <nav class="grid gap-2 px-3 py-4 text-sm font-bold">
        <a
          routerLink="/dashboard"
          [routerLinkActiveOptions]="{ exact: true }"
          routerLinkActive="bg-[#e3f2fd] text-[#1e88e5]"
          class="rounded-xl px-4 py-3 text-[#64748b] hover:bg-[#f1f5f9]"
        >
          Overview
        </a>
        <a
          routerLink="/dashboard/quizzes"
          routerLinkActive="bg-[#e3f2fd] text-[#1e88e5]"
          class="rounded-xl px-4 py-3 text-[#64748b] hover:bg-[#f1f5f9]"
        >
          My Quizzes
        </a>
        <a
          routerLink="/dashboard/create-session"
          routerLinkActive="bg-[#e3f2fd] text-[#1e88e5]"
          class="rounded-xl px-4 py-3 text-[#64748b] hover:bg-[#f1f5f9]"
        >
          Create Session
        </a>
        <a
          routerLink="/dashboard/sessions"
          routerLinkActive="bg-[#e3f2fd] text-[#1e88e5]"
          class="rounded-xl px-4 py-3 text-[#64748b] hover:bg-[#f1f5f9]"
        >
          My Sessions
        </a>
        <a
          routerLink="/leaderboards"
          routerLinkActive="bg-[#e3f2fd] text-[#1e88e5]"
          class="rounded-xl px-4 py-3 text-[#64748b] hover:bg-[#f1f5f9]"
        >
          Leaderboards
        </a>
        <button
          type="button"
          class="rounded-xl px-4 py-3 text-left text-[#64748b] hover:bg-[#f1f5f9]"
          (click)="logout()"
        >
          Logout
        </button>
      </nav>
    </aside>

    <section class="flex-1 px-4 py-8 md:px-8">
      <nav class="mb-4 grid grid-cols-2 gap-2 text-xs font-bold sm:hidden">
        <a
          routerLink="/dashboard"
          class="rounded-lg bg-white px-3 py-2 text-center text-[#1e88e5]"
        >
          Overview
        </a>
        <a
          routerLink="/dashboard/quizzes"
          class="rounded-lg bg-white px-3 py-2 text-center text-[#1e88e5]"
        >
          Quizzes
        </a>
        <a
          routerLink="/dashboard/create-session"
          class="rounded-lg bg-white px-3 py-2 text-center text-[#1e88e5]"
        >
          Create
        </a>
        <a
          routerLink="/dashboard/sessions"
          class="rounded-lg bg-white px-3 py-2 text-center text-[#1e88e5]"
        >
          Sessions
        </a>
      </nav>

      <header
        class="mb-8 rounded-2xl border border-[#e4e7eb] bg-white p-5 shadow-[0_4px_0_0_rgba(0,0,0,0.08)]"
      >
        <p class="text-sm font-bold text-[#64748b]">Signed in as</p>
        <h2 class="font-display text-2xl font-bold text-[#1e88e5]">
          {{ currentUser()?.username || currentUser()?.email }}
        </h2>
      </header>

      <router-outlet></router-outlet>
    </section>
  </div>
</main>
