# Cloudflare Pages deployment configuration for QuizForge frontend
# Build output: dist/apps/frontend/browser
#
# NOTE: Build is handled by Nx (not Wrangler). Wrangler's auto-detection
# doesn't support Nx integrated executors (@angular/build:application).
# Always build first, then deploy:
#
#   bun run build:frontend
#   bunx wrangler pages deploy dist/apps/frontend/browser --branch=main
#
# Required environment variables (set in Cloudflare dashboard):
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_PUBLISHABLE_KEY
#   VITE_API_BASE_URL
#   VITE_WEBSOCKET_URL
#   VITE_SENTRY_DSN
#
# Cloudflare automatically treats this as an SPA (no 404.html at root).
# Unmatched client routes will serve index.html — Angular handles routing.
# For local preview:
#   wrangler pages dev dist/apps/frontend/browser

name = "quizforge"
pages_build_output_dir = "dist/apps/frontend/browser"
